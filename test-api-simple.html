<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Simple</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Test de l'API PHP</h1>
    
    <button onclick="testBasic()">Test API de base</button>
    <button onclick="testArticles()">Test Articles</button>
    <button onclick="testWithParams()">Test avec paramètres</button>
    
    <div id="results"></div>

    <script>
        async function testBasic() {
            const results = document.getElementById('results');
            
            try {
                const response = await fetch('./api.php');
                const text = await response.text();
                
                results.innerHTML = `
                    <div class="result success">
                        <h3>✅ Test API de base réussi</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Headers:</strong> ${JSON.stringify([...response.headers.entries()])}</p>
                        <p><strong>Response (first 500 chars):</strong></p>
                        <pre>${text.substring(0, 500)}${text.length > 500 ? '...' : ''}</pre>
                    </div>
                `;
            } catch (error) {
                results.innerHTML = `
                    <div class="result error">
                        <h3>❌ Erreur lors du test API de base</h3>
                        <p><strong>Erreur:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testArticles() {
            const results = document.getElementById('results');
            
            try {
                const response = await fetch('./api.php?statut=Publié&limit=5');
                const data = await response.json();
                
                results.innerHTML = `
                    <div class="result success">
                        <h3>✅ Test Articles réussi</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Data:</strong></p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                results.innerHTML = `
                    <div class="result error">
                        <h3>❌ Erreur lors du test Articles</h3>
                        <p><strong>Erreur:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testWithParams() {
            const results = document.getElementById('results');
            
            try {
                const params = new URLSearchParams({
                    statut: 'Publié',
                    categorie: 'Aviation Civile',
                    limit: 3
                });
                
                const response = await fetch(`./api.php?${params}`);
                const data = await response.json();
                
                results.innerHTML = `
                    <div class="result success">
                        <h3>✅ Test avec paramètres réussi</h3>
                        <p><strong>URL:</strong> ./api.php?${params}</p>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Data:</strong></p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                results.innerHTML = `
                    <div class="result error">
                        <h3>❌ Erreur lors du test avec paramètres</h3>
                        <p><strong>Erreur:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
